description: Synopsys DesignWare Ethernet

compatible: "snps,designware-ethernet"

include: ethernet-controller.yaml

properties:
  reg:
    required: true
  interrupts:
    required: true
  eth_mdio:
    type: phandle
    description: |
      Phandle to the MDIO controller for managing PHY
      configuration and link setup.
